<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çok Yakında</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #1d1d1f;
    --gray: #6e6e73;
    --light: #f5f5f7;
    --white: #ffffff;
    --border: rgba(0,0,0,0.10);
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    background: var(--white);
    color: var(--black);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Subtle background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,0,0,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  a[href="/index.html"] {
    display: none;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    width: 100%;
  }

  /* Eyebrow */
  .eyebrow {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gray);
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    margin-bottom: 20px;
  }

  /* Main heading */
  h1 {
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1.08;
    color: var(--black);
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.25s forwards;
    margin-bottom: 28px;
  }

  /* Thin decorative line */
  .line {
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 0 auto 28px;
    opacity: 0;
    animation: scaleIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.45s forwards;
    transform-origin: center;
  }

  /* Subtitle */
  .subtitle {
    font-size: 17px;
    font-weight: 400;
    color: var(--gray);
    letter-spacing: -0.01em;
    line-height: 1.5;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards;
    margin-bottom: 36px;
  }

  /* Social buttons row */
  .buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.7s forwards;
  }

  .buttons a {
    text-decoration: none;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 9px 20px;
    font-size: 14px;
    font-weight: 500;
    color: var(--black);
    border-radius: 980px;
    letter-spacing: -0.01em;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.2s ease;
    cursor: pointer;
  }

  .buttons a:hover {
    background: var(--black);
    border-color: var(--black);
    color: var(--white);
    transform: translateY(-1px);
  }

  .buttons a:active {
    transform: scale(0.97);
  }

  /* CTA button */
  .launch-wrap {
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
  }

  .launch-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    background: var(--black);
    color: var(--white);
    padding: 18px 48px;
    font-size: 17px;
    font-weight: 500;
    border-radius: 980px;
    letter-spacing: -0.015em;
    transition: background 0.25s ease, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  .launch-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  .launch-btn:hover {
    background: #1a1a1a;
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
  }

  .launch-btn:active {
    transform: scale(0.98);
  }

  .launch-btn .arrow {
    display: inline-block;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    font-size: 15px;
  }

  .launch-btn:hover .arrow {
    transform: translateX(4px);
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scaleX(0); }
    to   { opacity: 1; transform: scaleX(1); }
  }

  @media (max-width: 480px) {
    h1 { font-size: 28px; }
    .launch-btn { padding: 16px 36px; font-size: 15px; }
  }
</style>
</head>
<body>

<a href="/index.html"></a>

<div class="container">
  <div class="eyebrow">Yakında</div>
  <h1>Diğer yayınlarla<br>buradayız.</h1>
  <div class="line"></div>
  <p class="subtitle">İletişim adreslerimiz</p>

  <div class="buttons">
    <a href="#">Discord</a>
    <a href="#">Instagram</a>
    <a href="#">Telegram</a>
    <a href="#">Twitter</a>
  </div>

  <div class="launch-wrap">
    <a class="launch-btn" href="/">
      Yayına Git
      <span class="arrow">→</span>
    </a>
  </div>
</div>

</body>
</html>
